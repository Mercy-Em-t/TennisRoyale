<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ── Primary SEO ── -->
    <title>Tennis Royale — Tournament Management Platform</title>
    <meta name="description" content="Real-time tennis tournament management. Create brackets, track live scores, manage pools, and handle disputes — all from your phone." />
    <meta name="keywords"    content="tennis, tournament, bracket, live scores, scorecard, sports management" />
    <meta name="author"      content="Tennis Royale" />
    <meta name="robots"      content="index, follow" />
    <link rel="canonical"    href="https://tennisroyale.app" />

    <!-- ── Open Graph (Social sharing) ── -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://tennisroyale.app" />
    <meta property="og:title"       content="Tennis Royale — Real-Time Tournament Platform" />
    <meta property="og:description" content="Create. Compete. Conquer. The premium tennis tournament platform." />
    <meta property="og:image"       content="https://tennisroyale.app/og-image.png" />

    <!-- ── Twitter Card ── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Tennis Royale" />
    <meta name="twitter:description" content="Real-time tournament management for tennis." />
    <meta name="twitter:image"       content="https://tennisroyale.app/og-image.png" />

    <!-- ── PWA / Mobile ── -->
    <meta name="theme-color"                content="#0f172a" />
    <meta name="mobile-web-app-capable"     content="yes" />
    <meta name="apple-mobile-web-app-capable"       content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Tennis Royale" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest"         href="/manifest.json" />

    <!-- ── Favicon ── -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="32x32"   href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16"   href="/favicon-16.png" />

    <!-- ── Performance ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://firestore.googleapis.com" />
    <link rel="dns-prefetch" href="https://identitytoolkit.googleapis.com" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
